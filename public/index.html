<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETORA WA Gateway - Dashboard</title>
    <link rel="icon" type="image/png" href="NETORA-LOGO.png">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --secondary: #7C3AED;
            --tertiary: #6B7280;
            --bg-color: #FAFAFA;
            --surface: #FFFFFF;
            --success: #16A34A;
            --warning: #CA8A04;
            --error: #DC2626;
            --text-main: #18181B;
            --text-muted: #52525B;
            
            --border-light: #F4F4F5;
            --border-input: #E4E4E7;
            
            --shadow-subtle: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-medium: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-large: 0 12px 32px rgba(0,0,0,0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.7;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 0.01em;
            color: var(--text-main);
        }

        .navbar {
            width: 100%;
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 40;
            box-shadow: var(--shadow-subtle);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .navbar-brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .navbar-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border-input);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .btn-icon:hover {
            background: #F4F4F5;
            color: var(--text-main);
        }

        .btn-icon.logout {
            border-color: rgba(220, 38, 38, 0.2);
            color: var(--error);
        }

        .btn-icon.logout:hover {
            background: #FEF2F2;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding: 3rem 2rem;
        }

        .top-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media(min-width: 768px) {
            .top-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: var(--shadow-subtle);
            transition: box-shadow 0.2s ease;
        }
        .card:hover {
            box-shadow: var(--shadow-medium);
        }

        .card h2 { 
            font-size: 1.375rem; 
            font-weight: 600; 
            margin-bottom: 1.5rem; 
        }

        .form-group { margin-bottom: 1rem; }
        .form-group label { 
            display: block; 
            font-size: 0.875rem; 
            font-weight: 500;
            margin-bottom: 0.5rem; 
            color: var(--text-muted); 
        }
        
        .form-control {
            width: 100%;
            padding: 0.625rem 0.875rem;
            background: var(--surface);
            border: 1px solid var(--border-input);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-control:hover { border-color: #D4D4D8; }
        .form-control:focus { border: 2px solid var(--primary); padding: calc(0.625rem - 1px) calc(0.875rem - 1px); }

        .btn {
            width: 100%;
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--primary);
            color: #FFFFFF;
        }
        .btn:hover { background: var(--primary-hover); }

        .btn-destructive {
            background: var(--error);
        }
        .btn-destructive:hover {
            background: #B91C1C;
        }

        .session-list { display: flex; flex-direction: column; gap: 1rem; }
        .session-item {
            background: var(--surface);
            border: 1px solid var(--border-light);
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-info h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-family: 'Fira Code', monospace;
            font-weight: 500;
        }
        .status-connected { background: #F0FDF4; color: var(--success); }
        .status-disconnected { background: #FEF2F2; color: var(--error); }
        .status-waiting { background: #FFF7ED; color: var(--warning); }

        .action-btns { display: flex; gap: 0.5rem; }
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border-radius: 6px;
            background: var(--surface);
            color: var(--primary);
            border: 1px solid var(--primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-sm:hover { background: #EFF6FF; }

        .btn-sm.btn-danger {
            color: var(--error);
            border-color: var(--error);
        }
        .btn-sm.btn-danger:hover {
            background: #FEF2F2;
        }

        /* Modal Overlays */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.35); /* DocuForge overlay */
            display: none; justify-content: center; align-items: center;
            z-index: 100;
            backdrop-filter: blur(2px);
        }
        .modal-overlay.active { display: flex; }
        
        .modal-content {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-large);
            border: 1px solid var(--border-light);
        }
        
        .close-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-input);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .close-btn:hover { background: #F4F4F5; color: var(--text-main); }

        #qrcode-container img { margin: 0 auto; border-radius: 8px; }
        
        /* Toast Notifications */
        #toast-container {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            display: flex; flex-direction: column; gap: 12px; pointer-events: none;
        }

        .toast-notification {
            background: #18181B; color: #FFFFFF; font-family: 'Inter', sans-serif;
            font-size: 0.875rem; padding: 12px 16px;
            border-radius: 8px; box-shadow: var(--shadow-medium);
            display: flex; align-items: center; gap: 12px;
            transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto; max-width: 320px; word-break: break-word;
        }

        .toast-notification.show { transform: translateX(0); }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection" style="display: none; width: 100%; min-height: 100vh; justify-content: center; align-items: center; background: var(--bg-color);">
        <div class="card" style="width: 90%; max-width: 400px; text-align: center; padding: 3rem 2rem;">
            <img src="NETORA-LOGO.png" alt="NETORA Logo" style="height: 48px; width: auto; margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text-main);">Selamat Datang</h2>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem;">Masuk ke Dashboard NETORA WA Gateway</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group" style="text-align: left;">
                    <label>Username</label>
                    <input type="text" id="loginUsername" class="form-control" required placeholder="Ketik username...">
                </div>
                <div class="form-group" style="text-align: left; margin-bottom: 2rem;">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="Ketik password...">
                </div>
                <button type="submit" class="btn" id="btnLogin" style="width: 100%;">Masuk Sekarang</button>
            </form>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="appSection" style="display: none; width: 100%; flex-direction: column; align-items: center;">

    <nav class="navbar">
        <div class="navbar-brand">
            <img src="NETORA-LOGO.png" alt="NETORA Logo" style="height: 32px; width: auto; object-fit: contain;">
            <h1>NETORA WA Gateway</h1>
        </div>
        <div class="navbar-actions">
            <button class="btn-icon" onclick="openSettings()">⚙️ Pengaturan</button>
            <button class="btn-icon logout" onclick="logoutDashboard()">🚪 Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Top Row Actions -->
        <div class="top-row">
            <div class="card">
                <h2>+ Create Device (Nomor WA Baru)</h2>
                <div class="form-group">
                    <label>Nama Device / Sesi ID (Tanpa Spasi, misal: pusat_01)</label>
                    <input type="text" id="newSessionId" class="form-control" placeholder="Ketik nama device...">
                </div>
                <button class="btn" onclick="startSession()">Create & Munculkan QR</button>
            </div>

            <div class="card">
                <h2>Uji Kirim Pesan</h2>
                <div class="form-group">
                    <label>Pilih ID Sesi (Pengirim)</label>
                    <select id="sendSessionId" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label style="margin-bottom: 0.8rem;">Tipe Target</label>
                    <div style="display: flex; gap: 1rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="targetType" value="number" checked onchange="toggleTargetInput()"> Nomor WA
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="targetType" value="group" onchange="toggleTargetInput()"> Grup WA
                        </label>
                    </div>
                </div>
                <div class="form-group" id="targetNumberContainer">
                    <label>Nomor HP Tujuan (08x/62x)</label>
                    <input type="text" id="sendPhone" class="form-control" placeholder="08123456789">
                </div>
                <div class="form-group" id="targetGroupContainer" style="display: none;">
                    <label>Pilih Grup WA <span id="groupLoadingText" style="color: var(--primary); font-size: 0.8rem; display: none;">(Mengambil data grup...)</span></label>
                    <select id="sendGroup" class="form-control">
                        <option value="">-- Pilih Grup --</option>
                    </select>
                </div>
                <button class="btn" style="background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);" onclick="testSendMessage()">TEST</button>
            </div>
        </div>

        <!-- Session List -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Daftar Sesi (Device Aktif)</h2>
                <button class="btn-sm" onclick="fetchSessions()">🔄 Refresh</button>
            </div>
            
            <div class="session-list" id="sessionList">
                <div style="text-align:center; color: var(--text-muted); padding: 2rem;">Loading data...</div>
            </div>
        </div>

    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content" style="max-width: 400px; padding: 24px; background: var(--card-bg);">
            <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">⚙️ Pengaturan Keamanan</h2>
            <div class="form-group">
                <label>Username Baru</label>
                <input type="text" id="newUsername" class="form-control" placeholder="Ketik username baru...">
            </div>
            <div class="form-group">
                <label>Password Baru</label>
                <input type="password" id="newPassword" class="form-control" placeholder="Ketik password baru...">
            </div>
            <button class="btn" style="background: var(--danger); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); margin-bottom: 1rem;" onclick="changeCredentials()">Simpan Akses Login</button>
            <button class="close-btn" onclick="closeSettings()">Tutup</button>
        </div>
    </div>

    <!-- QR Modal -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal-content">
            <h2 id="qrTitle">Scan QR Code</h2>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-top:0.5rem;">Buka WhatsApp > Tautkan Perangkat</p>
            <div id="qrcode-container"></div>
            <p id="qrStatusText" style="font-size:0.875rem; margin-top:1rem; color: #f59e0b;"></p>
            <div id="qrCountdown" style="display:none; margin-top:0.5rem;">
                <div style="background:rgba(255,255,255,0.1); border-radius:8px; overflow:hidden; height:6px; width:100%;">
                    <div id="qrCountdownBar" style="height:100%; background:linear-gradient(90deg, #f59e0b, #ef4444); border-radius:8px; transition: width 1s linear; width:100%;"></div>
                </div>
                <p id="qrCountdownText" style="font-size:0.75rem; color:var(--text-muted); margin-top:0.4rem;">QR berlaku <span id="qrSecondsLeft">20</span> detik lagi</p>
            </div>
            <button class="close-btn" onclick="closeModal()">Tutup</button>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content" style="max-width: 400px; padding: 24px; text-align: left; background: var(--card-bg); box-shadow: 0 12px 32px rgba(0,0,0,0.3);">
            <h3 id="confirmTitle" style="font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;"></h3>
            <p id="confirmMessage" style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.6; white-space: pre-wrap;"></p>
            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button class="btn-sm" style="background: rgba(255,255,255,0.1); padding: 8px 16px;" id="confirmBtnCancel">Cancel</button>
                <button class="btn-sm" style="background: var(--primary); padding: 8px 16px;" id="confirmBtnOk">OK</button>
            </div>
        </div>
    </div>

    </div> <!-- End App Section -->

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
        const API_URL = ''; // Gunakan relative path karena di-serve dari port yg sama

        // ----------------------------------------
        // AUTHENTICATION & FETCH INTERCEPTOR
        // ----------------------------------------
        const originalFetch = window.fetch;
        window.fetch = async function() {
            let [resource, config] = arguments;
            if (typeof resource === 'string' && resource.includes('/api/')) {
                config = config || {};
                config.headers = config.headers || {};
                const token = localStorage.getItem('authToken');
                if (token) {
                    config.headers['Authorization'] = 'Basic ' + token;
                }
            }
            const response = await originalFetch(resource, config);
            if (response.status === 401) {
                localStorage.removeItem('authToken');
                document.getElementById('appSection').style.display = 'none';
                document.getElementById('loginSection').style.display = 'flex';
            }
            return response;
        };

        function initAuth() {
            const token = localStorage.getItem('authToken');
            if (token) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'flex';
                fetchSessions(); // Mulai load data
                if (!window.pollingInterval) {
                    window.pollingInterval = setInterval(fetchSessions, 10000);
                }
            } else {
                document.getElementById('appSection').style.display = 'none';
                document.getElementById('loginSection').style.display = 'flex';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('loginUsername').value;
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLogin');
            
            btn.textContent = 'Memeriksa...';
            btn.disabled = true;

            const token = btoa(user + ':' + pass);
            
            try {
                const res = await originalFetch(`${API_URL}/api/sessions`, {
                    headers: { 'Authorization': 'Basic ' + token }
                });

                if (res.ok) {
                    localStorage.setItem('authToken', token);
                    document.getElementById('loginUsername').value = '';
                    document.getElementById('loginPassword').value = '';
                    initAuth();
                    showToast("Login berhasil!", "toast-success");
                } else {
                    showToast("Username atau Password salah!", "toast-error");
                }
            } catch (err) {
                showToast("Tidak dapat terhubung ke server.", "toast-error");
            } finally {
                btn.textContent = 'Masuk Sekarang';
                btn.disabled = false;
            }
        }
        // ----------------------------------------
        let qrPollingInterval = null;
        let currentPollingSession = null;
        let lastQrString = null;
        let qrCountdownInterval = null;
        const QR_LIFETIME_SECONDS = 20; // WhatsApp QR biasanya berlaku ~20 detik

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function logoutDashboard() {
            showConfirm("Apakah Anda yakin ingin keluar dari dashboard?", true).then((confirmed) => {
                if (confirmed) {
                    localStorage.removeItem('authToken');
                    window.location.reload(true);
                }
            });
        }

        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Determine class and icon based on type (or message contents heuristically)
            let typeClass = 'toast-info';
            let icon = 'ℹ️';
            
            const lowerMsg = message.toLowerCase();
            if (type === 'success' || lowerMsg.includes('berhasil') || lowerMsg.includes('sukses')) {
                typeClass = 'toast-success'; icon = '✅';
            } else if (type === 'error' || lowerMsg.includes('gagal') || lowerMsg.includes('salah')) {
                typeClass = 'toast-error'; icon = '❌';
            } else if (type === 'warning' || lowerMsg.includes('perhatian')) {
                typeClass = 'toast-warning'; icon = '⚠️';
            }

            toast.className = `toast-notification ${typeClass}`;
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => toast.classList.add('show'));
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function showConfirm(message, isDanger = false) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirmModal');
                const title = document.getElementById('confirmTitle');
                const msg = document.getElementById('confirmMessage');
                const btnOk = document.getElementById('confirmBtnOk');
                const btnCancel = document.getElementById('confirmBtnCancel');

                // Determine styling and icon based on danger level
                const iconHtml = isDanger ? '<span style="font-size:1.4rem;">⚠️</span>' : '<span style="font-size:1.4rem;">❔</span>';
                title.innerHTML = `${iconHtml} <span style="color: #fff;">Konfirmasi</span>`;
                btnOk.style.background = isDanger ? 'var(--danger)' : 'var(--primary)';
                btnOk.innerText = isDanger ? 'Ya, Lanjutkan' : 'OK';
                
                // Clean up any warning emojis in the message text itself
                msg.innerText = message.replace(/⚠️ PERHATIAN!\n\n/g, '').trim();

                modal.classList.add('active');

                const cleanup = () => {
                    modal.classList.remove('active');
                    btnOk.removeEventListener('click', onOk);
                    btnCancel.removeEventListener('click', onCancel);
                };

                const onOk = () => { cleanup(); resolve(true); };
                const onCancel = () => { cleanup(); resolve(false); };

                btnOk.addEventListener('click', onOk);
                btnCancel.addEventListener('click', onCancel);
            });
        }

        async function fetchSessions() {
            try {
                const res = await fetch(`${API_URL}/api/sessions`);
                const json = await res.json();
                
                const list = document.getElementById('sessionList');
                const select = document.getElementById('sendSessionId');
                list.innerHTML = '';
                select.innerHTML = '<option value="">-- Pilih Sesi --</option>';

                if (json.data.length === 0) {
                    list.innerHTML = `<div style="text-align:center; color: var(--text-muted); padding: 2rem;">Belum ada sesi/device yang terdaftar.</div>`;
                    return;
                }

                json.data.forEach(session => {
                    // Badge Logic
                    let badgeClass = 'status-disconnected';
                    let statusText = session.status;

                    if (session.status === 'Connected') badgeClass = 'status-connected';
                    else if (session.hasQr) {
                        badgeClass = 'status-waiting';
                        statusText = 'Menunggu Scan QR';
                    }

                    // Render List
                    list.innerHTML += `
                        <div class="session-item">
                            <div class="session-info">
                                <h3>ID: ${session.sessionId}</h3>
                                <span class="status-badge ${badgeClass}">${statusText}</span>
                            </div>
                            <div class="action-btns">
                                ${session.status !== 'Connected' ? `<button class="btn-sm" style="background:#3b82f6;" onclick="showQr('${session.sessionId}')">Lihat QR</button>` : ''}
                                <button class="btn-sm" style="background:var(--warning);" onclick="reconnectSession('${session.sessionId}')">Reconnect</button>
                                <button class="btn-sm" style="background:var(--danger);" onclick="logoutSession('${session.sessionId}')">Logout</button>
                                <button class="btn-sm" style="background:#475569;" onclick="deleteSession('${session.sessionId}')">Delete</button>
                            </div>
                        </div>
                    `;

                    // Render Select Option (only connected ones)
                    if (session.status === 'Connected') {
                        select.innerHTML += `<option value="${session.sessionId}">${session.sessionId}</option>`;
                    }
                });

            } catch (error) {
                console.error("Error fetching sessions:", error);
            }
        }

        async function startSession() {
            const input = document.getElementById('newSessionId');
            let sessionId = input.value.trim();
            if (!sessionId) {
                sessionId = 'device_' + Math.floor(Date.now() / 1000);
            }

            try {
                const res = await fetch(`${API_URL}/api/session/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
                const json = await res.json();
                showToast(json.message);
                if (json.status) {
                    input.value = '';
                    fetchSessions();
                    // Auto buka modal QR setelah delay
                    setTimeout(() => showQr(sessionId), 1500); 
                }
            } catch (error) {
                showToast("Gagal memulai sesi");
            }
        }

        async function showQr(sessionId) {
            document.getElementById('qrModal').classList.add('active');
            document.getElementById('qrTitle').innerText = `Scan QR untuk [${sessionId}]`;
            document.getElementById('qrcode-container').innerHTML = '';
            document.getElementById('qrStatusText').innerText = 'Mengambil QR Code...';
            document.getElementById('qrCountdown').style.display = 'none';
            lastQrString = null;
            currentPollingSession = sessionId;
            
            pollQr();
            qrPollingInterval = setInterval(pollQr, 2000);
        }

        function startQrCountdown() {
            clearInterval(qrCountdownInterval);
            let secondsLeft = QR_LIFETIME_SECONDS;
            const countdownDiv = document.getElementById('qrCountdown');
            const bar = document.getElementById('qrCountdownBar');
            const text = document.getElementById('qrSecondsLeft');
            
            countdownDiv.style.display = 'block';
            bar.style.width = '100%';
            text.innerText = secondsLeft;

            qrCountdownInterval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft <= 0) {
                    clearInterval(qrCountdownInterval);
                    text.innerText = '0';
                    bar.style.width = '0%';
                    // Reset lastQrString agar polling langsung render QR baru
                    lastQrString = null;
                    document.getElementById('qrcode-container').style.opacity = '0.2';
                    document.getElementById('qrStatusText').innerText = '⏳ QR kadaluarsa, memuat QR baru...';
                    return;
                }
                text.innerText = secondsLeft;
                bar.style.width = ((secondsLeft / QR_LIFETIME_SECONDS) * 100) + '%';
            }, 1000);
        }

        async function pollQr() {
            if (!currentPollingSession) return;
            try {
                const res = await fetch(`${API_URL}/api/qr?sessionId=${currentPollingSession}`);
                const json = await res.json();
                
                const qrContainer = document.getElementById('qrcode-container');
                const statusText = document.getElementById('qrStatusText');

                if (json.status === 'Scan' && json.qr_string) {
                    // Hanya re-render jika QR string berubah (auto-refresh tanpa flicker)
                    if (json.qr_string !== lastQrString) {
                        lastQrString = json.qr_string;
                        qrContainer.style.opacity = '0.3';
                        setTimeout(() => {
                            qrContainer.innerHTML = '';
                            new QRCode(qrContainer, {
                                text: json.qr_string,
                                width: 200,
                                height: 200,
                                colorDark : "#0f172a",
                                colorLight : "#ffffff"
                            });
                            qrContainer.style.opacity = '1';
                        }, 200);
                        statusText.innerText = "Silakan Scan Sekarang.";
                        statusText.style.color = "#f59e0b";
                        startQrCountdown();
                    }
                } else if (json.status === 'Connected') {
                    statusText.innerText = "✅ Perangkat berhasil tertaut!";
                    statusText.style.color = "var(--success)";
                    qrContainer.innerHTML = '✔️';
                    qrContainer.style.fontSize = '4rem';
                    qrContainer.style.color = 'var(--success)';
                    document.getElementById('qrCountdown').style.display = 'none';
                    clearInterval(qrPollingInterval);
                    clearInterval(qrCountdownInterval);
                    setTimeout(() => { closeModal(); fetchSessions(); }, 2000);
                } else {
                    statusText.innerText = json.message || "Menunggu sistem...";
                }
            } catch (error) {
                console.error(error);
            }
        }

        function closeModal() {
            document.getElementById('qrModal').classList.remove('active');
            document.getElementById('qrCountdown').style.display = 'none';
            clearInterval(qrPollingInterval);
            clearInterval(qrCountdownInterval);
            currentPollingSession = null;
            lastQrString = null;
            fetchSessions();
        }

        async function reconnectSession(sessionId) {
            if (!(await showConfirm(`Mencoba menghubungkan ulang sesi [${sessionId}]?`))) return;
            try {
                const res = await fetch(`${API_URL}/api/session/reconnect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
                const json = await res.json();
                showToast(json.message);
                fetchSessions();
            } catch (error) {
                showToast("Gagal menghubungi server untuk reconnect.");
            }
        }

        async function logoutSession(sessionId) {
            if (!(await showConfirm(`⚠️ PERHATIAN!\n\nApakah Anda yakin ingin LOGOUT sesi [${sessionId}]?\nIni akan mencabut akses WhatsApp secara permanen.`, true))) return;
            try {
                const res = await fetch(`${API_URL}/api/session/logout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
                const json = await res.json();
                showToast(json.message);
                fetchSessions();
            } catch (error) {
                showToast("Gagal menghubungi server untuk logout.");
            }
        }

        async function deleteSession(sessionId) {
            if (!(await showConfirm(`Hapus paksa sesi [${sessionId}] dari memori dan dashboard?\nGunakan ini jika device nyangkut/error.`, true))) return;
            try {
                const res = await fetch(`${API_URL}/api/session/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
                const json = await res.json();
                showToast(json.message);
                fetchSessions();
            } catch (error) {
                showToast("Gagal menghubungi server untuk menghapus sesi.");
            }
        }

        async function loadGroups(sessionId) {
            const selectGroup = document.getElementById('sendGroup');
            const loadingText = document.getElementById('groupLoadingText');
            selectGroup.innerHTML = '<option value="">-- Pilih Grup --</option>';
            if (!sessionId) return;

            loadingText.style.display = 'inline-block';
            try {
                const res = await fetch(`${API_URL}/api/groups?sessionId=${sessionId}`);
                const json = await res.json();
                if (json.status && json.data) {
                    json.data.forEach(group => {
                        selectGroup.innerHTML += `<option value="${group.id}">${group.name}</option>`;
                    });
                } else {
                    showToast(json.message || "Gagal mengambil daftar grup", "error");
                }
            } catch (error) {
                showToast("Gagal menghubungi server untuk mengambil grup", "error");
            } finally {
                loadingText.style.display = 'none';
            }
        }

        function toggleTargetInput() {
            const type = document.querySelector('input[name="targetType"]:checked').value;
            const sessionId = document.getElementById('sendSessionId').value;
            
            if (type === 'group') {
                document.getElementById('targetNumberContainer').style.display = 'none';
                document.getElementById('targetGroupContainer').style.display = 'block';
                loadGroups(sessionId);
            } else {
                document.getElementById('targetNumberContainer').style.display = 'block';
                document.getElementById('targetGroupContainer').style.display = 'none';
            }
        }

        // Trigger reload groups if session changes and group mode is active
        document.getElementById('sendSessionId').addEventListener('change', () => {
            const type = document.querySelector('input[name="targetType"]:checked').value;
            if (type === 'group') {
                loadGroups(document.getElementById('sendSessionId').value);
            }
        });

        async function testSendMessage() {
            const sessionId = document.getElementById('sendSessionId').value;
            const message = "NETORA WA GATEWAY";
            
            const targetType = document.querySelector('input[name="targetType"]:checked').value;
            let phone = '';
            
            if (targetType === 'number') {
                phone = document.getElementById('sendPhone').value.trim();
            } else {
                phone = document.getElementById('sendGroup').value;
            }

            if (!sessionId || !phone || !message) return showToast("Harap lengkapi form pengiriman pesan!", "warning");

            try {
                const res = await fetch(`${API_URL}/api/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, phone, message })
                });
                const json = await res.json();
                showToast(json.message, json.status ? "success" : "error");
                if(json.status) {
                    // Do not clear the textarea message as requested (keep template)
                    if (targetType === 'number') document.getElementById('sendPhone').value = '';
                }
            } catch (error) {
                showToast("Gagal mengirim pesan", "error");
            }
        }

        async function changeCredentials() {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();

            if (!username || !password) return showToast("Username dan Password baru wajib diisi!", "warning");
            if (!(await showConfirm("⚠️ PERHATIAN!\n\nApakah Anda yakin ingin mengganti kredensial login?\nSetelah tersimpan, halaman akan termuat ulang dan Anda harus login dengan akses yang baru.", true))) return;

            try {
                const res = await fetch(`${API_URL}/api/settings/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const json = await res.json();
                showToast(json.message);
                if (json.status) {
                    window.location.reload(); // Paksa browser untuk popup auth ulang
                }
            } catch (error) {
                showToast("Terjadi kesalahan sistem saat menyimpan pengaturan.");
            }
        }

        // Initialize Auth
        initAuth();

    </script>
</body>
</html>
